<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Josie">
<meta name="theme-color" content="#F4F1FB">
<link id="touchIcon" rel="apple-touch-icon">
<link id="maniLink" rel="manifest">
<title>Josie</title>
<style>
:root{
  --bg:#FAF8FE; --bg2:#F2EEFB;
  --accent:#9277D6; --accent2:#B7A4EC; --accent3:#6A4FBE; --soft:#DCD2F2;
  --gold:#C2A24A; --ink:#2E2747; --muted:#8E86A8;
  --glass:rgba(255,255,255,.62); --line:rgba(110,84,192,.11);
  --good:#6BA88C; --warn:#C99A5C; --bad:#C77E96;
  --card:linear-gradient(155deg,rgba(255,255,255,.93),rgba(255,255,255,.60));
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  --font-head:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-logo:'Hoefler Text','Didot','Bodoni MT',Georgia,'Times New Roman',serif;
  --radius:26px;
  --sh1:0 1px 3px rgba(80,60,130,.045);
  --sh2:0 16px 44px rgba(98,72,154,.085),0 4px 14px rgba(98,72,154,.04);
  --c-logo:var(--accent3); --w-logo:500; --st-logo:italic;
  --c-head:var(--ink); --w-head:800; --st-head:normal;
  --c-body:var(--ink); --w-body:400; --st-body:normal;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg2);font-family:var(--font-body);overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center}
#phone{width:100%;max-width:440px;min-height:100vh;position:relative;color:var(--c-body);font-weight:var(--w-body);font-style:var(--st-body);
  background:
    radial-gradient(900px 420px at 86% -8%, rgba(146,119,214,.18), transparent 60%),
    radial-gradient(720px 420px at -16% 10%, rgba(183,164,236,.20), transparent 58%),
    radial-gradient(680px 560px at 50% 112%, rgba(160,132,214,.12), transparent 60%),
    linear-gradient(180deg,var(--bg) 0%, #F1ECFB 100%);
  background-attachment:fixed}
body{overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}
.hidden{display:none!important}
.ic-svg{vertical-align:-.18em;flex:none}

#header{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 20px 13px;
  backdrop-filter:blur(24px) saturate(1.7);-webkit-backdrop-filter:blur(24px) saturate(1.7);
  background:linear-gradient(180deg,rgba(250,248,254,.95),rgba(250,248,254,.16));
  box-shadow:0 16px 24px -20px rgba(98,72,154,.5)}
.logo-wrap{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.logo-img{width:30px;height:30px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,.6);border:1px solid var(--line)}
.logo-txt{font-family:var(--font-logo);font-size:28px;letter-spacing:.5px;color:var(--c-logo);font-weight:var(--w-logo);font-style:var(--st-logo)}
.hdr-right{display:flex;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(255,255,255,.5));
  border:1px solid rgba(255,255,255,.7);padding:8px 13px;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;
  box-shadow:0 4px 14px rgba(85,58,138,.1),inset 0 1px 0 rgba(255,255,255,.8);transition:transform .15s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.pill:active{transform:scale(.93)} .pill.flame{color:var(--warn)} .pill.pts{color:var(--accent3)}

#screen{padding:18px 18px 138px;min-height:60vh;will-change:opacity,transform}
@keyframes screenIn{0%{opacity:0;transform:translateY(13px) scale(.985)}100%{opacity:1;transform:none}}
@keyframes screenInL{0%{opacity:0;transform:translateX(28px)}100%{opacity:1;transform:none}}
@keyframes screenInR{0%{opacity:0;transform:translateX(-28px)}100%{opacity:1;transform:none}}
.anim-up{animation:screenIn .46s cubic-bezier(.22,.61,.36,1)}
.anim-l{animation:screenInL .42s cubic-bezier(.22,.61,.36,1)}
.anim-r{animation:screenInR .42s cubic-bezier(.22,.61,.36,1)}
.s-title{font-family:var(--font-head);font-size:28px;font-weight:var(--w-head);font-style:var(--st-head);color:var(--c-head);margin:6px 2px 3px;letter-spacing:-.6px}
.s-sub{color:var(--muted);font-size:13.5px;margin:0 2px 18px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.card{background:var(--card);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid rgba(255,255,255,.62);border-radius:var(--radius);padding:17px;box-shadow:var(--sh2);position:relative}
.card::after{content:"";position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.stat{padding:16px 15px;display:flex;flex-direction:column;gap:3px}
.stat.tap{cursor:pointer;transition:transform .15s}.stat.tap:active{transform:scale(.96)}
.stat .v{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat .l{font-size:11.5px;color:var(--muted);font-weight:600}
.stat .ic{margin-bottom:7px;color:var(--accent);opacity:.92}
.ring{--p:0;width:84px;height:84px;border-radius:50%;display:grid;place-items:center;flex:none;
  background:conic-gradient(var(--accent) calc(var(--p)*1%), rgba(139,111,212,.13) 0)}
.ring .inner{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;font-weight:800;font-size:19px;color:var(--accent3);box-shadow:inset 0 1px 5px rgba(139,111,212,.16)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;
  font-family:var(--font-body);font-weight:700;font-size:14.5px;border-radius:16px;padding:13px 16px;
  transition:transform .14s,filter .2s;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;box-shadow:0 10px 26px rgba(106,79,190,.30)}
.btn-soft{background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.5));border:1px solid rgba(255,255,255,.7);color:var(--accent3);box-shadow:var(--sh1);backdrop-filter:blur(10px)}
.btn-ghost{background:transparent;color:var(--muted);font-weight:600}
.btn-bad{background:rgba(196,106,134,.12);color:var(--bad);border:1px solid rgba(196,106,134,.22)}
.btn-block{width:100%}.btn-sm{padding:9px 13px;font-size:13px;border-radius:13px;gap:6px}

#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(440px,100%);z-index:50;display:flex;justify-content:center;padding:0 16px calc(16px + env(safe-area-inset-bottom))}
.nav-pill{display:flex;align-items:center;justify-content:space-between;width:100%;gap:2px;
  background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.64));
  backdrop-filter:blur(26px) saturate(1.6);-webkit-backdrop-filter:blur(26px) saturate(1.6);
  border:1px solid rgba(255,255,255,.72);border-radius:32px;padding:9px 12px;
  box-shadow:0 16px 40px rgba(85,58,138,.22),inset 0 1px 0 rgba(255,255,255,.9)}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;padding:4px 0;border-radius:16px;transition:color .25s}
.nav-i svg{transition:transform .25s}.nav-i.active{color:var(--accent3)}.nav-i.active svg{transform:translateY(-1px) scale(1.06)}
.nav-add{flex:none;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;display:grid;place-items:center;cursor:pointer;margin:0 4px;
  box-shadow:0 11px 26px rgba(139,111,212,.5),inset 0 1px 0 rgba(255,255,255,.45);transition:transform .18s}
.nav-add:active{transform:scale(.88) rotate(90deg)}

.picon{position:relative;border-radius:20px;overflow:hidden;flex:none;background:linear-gradient(160deg,rgba(255,255,255,.72),rgba(197,184,228,.24));box-shadow:inset 0 0 0 1px rgba(139,111,212,.06)}
.picon img{position:absolute;left:0;top:0;width:100%;height:100%;object-fit:contain}
.picon .l-bg{object-fit:cover}.picon .l-pot{width:80%;left:10%;top:auto;bottom:5%;height:auto}
.picon .l-plant{width:68%;left:16%;top:1%;height:74%;object-fit:contain;object-position:bottom}
.picon.legend{box-shadow:inset 0 0 0 2.5px var(--gold),0 0 22px rgba(194,162,74,.45)}

.plant-card{display:flex;gap:14px;align-items:center;padding:14px;margin-bottom:12px;cursor:pointer;transition:transform .16s}
.plant-card:active{transform:scale(.985)}.plant-card .pic{width:64px;height:64px}
.pc-body{flex:1;min-width:0}
.pc-name{font-weight:800;font-size:16.5px;display:flex;align-items:center;gap:7px;letter-spacing:-.3px}
.pc-meta{color:var(--muted);font-size:12.5px;margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pc-meta>span{display:inline-flex;align-items:center;gap:4px}
.pc-actions{position:absolute;top:13px;right:14px;display:flex;gap:12px;align-items:center;color:var(--muted)}
.pc-actions span{cursor:pointer;display:inline-flex}.pc-actions .fav-on{color:var(--gold)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(139,111,212,.1);color:var(--accent3)}
.chip.good{background:rgba(92,168,130,.15);color:var(--good)}.chip.warn{background:rgba(208,137,78,.15);color:var(--warn)}
.chip.bad{background:rgba(196,106,134,.15);color:var(--bad)}.chip.gold{background:rgba(194,162,74,.16);color:#8a6f1f}
.group-h{font-weight:800;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 4px 11px;display:flex;align-items:center;gap:7px}
.group-h.line::after{content:"";flex:1;height:1px;background:var(--line)}

.search{width:100%;padding:13px 15px;border-radius:16px;border:1px solid rgba(255,255,255,.6);background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.5));font-family:var(--font-body);font-size:14.5px;color:var(--ink);outline:none;margin-bottom:13px;box-shadow:var(--sh1);backdrop-filter:blur(10px)}
.filters{display:flex;gap:9px;overflow-x:auto;padding-bottom:9px;margin-bottom:4px}
.fil{white-space:nowrap;display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:24px;border:1px solid rgba(255,255,255,.7);
  background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(255,255,255,.52));font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;
  transition:all .22s;box-shadow:0 4px 14px rgba(85,58,138,.08),inset 0 1px 0 rgba(255,255,255,.85);backdrop-filter:blur(12px)}
.fil.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(139,111,212,.34)}

.tabs{display:flex;gap:5px;background:rgba(139,111,212,.08);border:1px solid var(--line);border-radius:18px;padding:5px;margin:16px 0}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:13px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .25s}
.tab.on{background:#fff;color:var(--accent3);box-shadow:0 4px 12px rgba(139,111,212,.16)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field .val{font-size:15px;font-weight:600}
input,select,textarea{font-family:var(--font-body);font-size:14.5px;color:var(--ink)}
.inp{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.78);outline:none;transition:border .2s}
.inp:focus{border-color:var(--accent2)}textarea.inp{resize:vertical;min-height:66px}
.row{display:flex;gap:10px}.row>*{flex:1;min-width:0}

.toggle{position:relative;width:48px;height:28px;border-radius:30px;background:rgba(139,111,212,.2);cursor:pointer;transition:background .25s;flex:none}
.toggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.toggle.on::after{left:23px}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}

.tagrow{display:flex;flex-wrap:wrap;gap:8px}
.tagsel{padding:8px 14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.65);font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s}
.tagsel.on{background:var(--accent);color:#fff;border-color:transparent}
.tagsel.on.bad{background:var(--bad)}.tagsel.on.warn{background:var(--warn)}.tagsel.on.good{background:var(--good)}

.phases{display:flex;gap:8px;overflow-x:auto;padding:4px 0 9px}
.phase{flex:none;text-align:center;padding:12px 14px;border-radius:17px;border:1px solid var(--line);background:rgba(255,255,255,.62);cursor:pointer;min-width:78px;transition:all .22s;color:var(--accent3)}
.phase.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 7px 18px rgba(139,111,212,.3)}
.phase.on.leg{background:linear-gradient(135deg,#c2a24a,#e0c264);color:#3a2f08}
.phase .e{height:24px;display:flex;align-items:center;justify-content:center}.phase .n{font-size:11px;font-weight:700;margin-top:5px;color:inherit}

.inc-card{display:flex;gap:14px;align-items:center;padding:15px;margin-bottom:12px;cursor:pointer;transition:transform .16s}
.inc-card:active{transform:scale(.985)}
.inc-ic{width:56px;height:56px;border-radius:17px;display:grid;place-items:center;flex:none;background:linear-gradient(160deg,rgba(168,139,224,.22),rgba(92,168,130,.15));border:1px solid var(--line)}
.inc-ic img{width:40px;height:40px;object-fit:contain}
.progress{height:8px;border-radius:6px;background:rgba(139,111,212,.13);overflow:hidden;margin-top:8px}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--accent2));border-radius:6px;transition:width .5s}

.shop-cats{display:flex;gap:9px;overflow-x:auto;margin-bottom:15px;padding-bottom:7px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.shop-item{padding:13px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.shop-item .pic{width:100px;height:100px}.shop-item .nm{font-weight:700;font-size:13px}.shop-item .pr{font-size:13px;font-weight:800;color:var(--accent3);display:inline-flex;align-items:center;gap:4px}
.owned-badge{font-size:11px;font-weight:800;color:var(--good);display:inline-flex;align-items:center;gap:4px}

.grave{position:relative;width:100%;padding:24px 14px 16px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(197,184,228,.18));border:1px solid var(--line);border-radius:100px 100px 16px 16px;overflow:hidden;cursor:pointer;box-shadow:var(--sh1)}
.grave .pic{width:56px;height:56px;margin:0 auto 9px;opacity:.82;filter:grayscale(.4)}
.grave .nm{font-weight:800;font-size:14px}.grave .dt{font-size:11px;color:var(--muted);margin-top:3px}
.grave .cross{color:var(--soft);margin-bottom:6px;display:flex;justify-content:center}

.badge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.badge{padding:15px 8px;text-align:center;border-radius:19px;border:1px solid var(--line);background:rgba(255,255,255,.55);box-shadow:var(--sh1)}
.badge .e{color:var(--accent);display:flex;justify-content:center;height:28px;align-items:center}
.badge.lock{opacity:.4;filter:grayscale(1)}.badge.lock .e{color:var(--muted)}
.badge .n{font-size:10.5px;font-weight:700;margin-top:7px;line-height:1.25}

#overlay,#overlay2{position:fixed;inset:0;z-index:100;background:rgba(48,36,74,.44);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s}
#overlay2{z-index:120;background:rgba(48,36,74,.32);align-items:center}
#overlay.on,#overlay2.on{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:440px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,#FCFBFF,#F2EFFA);border-radius:32px 32px 0 0;padding:10px 20px calc(30px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .38s cubic-bezier(.2,.84,.28,1);box-shadow:0 -12px 44px rgba(60,40,110,.22)}
.modal-sm{max-width:380px;border-radius:28px;margin:0 12px;transform:translateY(60px)}
#overlay.on .modal,#overlay2.on .modal{transform:none}
.modal-grab{width:44px;height:5px;border-radius:5px;background:var(--soft);margin:8px auto 16px;opacity:.55}
.modal h3{margin:4px 2px 16px;font-size:21px;font-weight:800;letter-spacing:-.4px;color:var(--c-head)}
.mini{font-size:12px;color:var(--muted);line-height:1.5}
.empty{text-align:center;padding:48px 16px;color:var(--muted)}
.empty .e{color:var(--soft);display:flex;justify-content:center;margin-bottom:8px}.empty p{margin:6px 0 4px;font-weight:700;color:var(--ink);font-size:15px}

#toast{position:fixed;top:calc(76px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);z-index:200;background:rgba(45,34,70,.96);color:#fff;padding:12px 19px;border-radius:30px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:all .32s;box-shadow:0 14px 36px rgba(0,0,0,.3);max-width:88%;backdrop-filter:blur(8px);display:flex;align-items:center;gap:7px}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.pts{background:linear-gradient(135deg,var(--accent3),var(--accent2))}#toast.bad{background:var(--bad)}

.list-row{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:11px}
.list-row .grow{flex:1;min-width:0}
.check{width:26px;height:26px;border-radius:9px;border:2px solid var(--soft);cursor:pointer;flex:none;display:grid;place-items:center;color:transparent;transition:all .2s}
.check.on{background:var(--good);border-color:var(--good);color:#fff}
.strike{text-decoration:line-through;color:var(--muted)}.icon-btn{cursor:pointer;padding:4px;color:var(--muted);display:inline-flex}
.pencil{position:absolute;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:grid;place-items:center;cursor:pointer;box-shadow:0 7px 18px rgba(139,111,212,.45);z-index:5;transition:transform .15s;border:2.5px solid #fff}
.pencil:active{transform:scale(.86)}
.adm-item{display:flex;align-items:center;gap:11px;padding:11px;border-radius:15px;background:rgba(255,255,255,.6);border:1px solid var(--line);margin-bottom:9px}
.adm-item .pic{width:48px;height:48px}.swatch{width:36px;height:36px;border-radius:11px;border:1px solid var(--line);cursor:pointer;padding:0;background:none}
.sheet-btn{display:flex;align-items:center;gap:13px;width:100%;padding:15px 16px;border-radius:16px;background:rgba(255,255,255,.72);border:1px solid var(--line);margin-bottom:10px;font-size:15px;font-weight:700;color:var(--ink);cursor:pointer;transition:transform .14s}
.sheet-btn:active{transform:scale(.97)}.sheet-btn .ico{color:var(--accent3);display:inline-flex}.sheet-btn.danger{color:var(--bad)}.sheet-btn.danger .ico{color:var(--bad)}
.photo-box{width:100%;border-radius:18px;overflow:hidden;border:1px solid var(--line);margin-bottom:10px;background:rgba(255,255,255,.5)}
.photo-box img{width:100%;display:block;max-height:240px;object-fit:cover}
.kbd{font-family:ui-monospace,monospace;background:rgba(139,111,212,.13);padding:2px 8px;border-radius:6px;font-weight:700;color:var(--accent3)}
.chart-wrap{overflow:hidden}.chart-wrap svg{width:100%;height:auto;display:block}
.style-btns{display:flex;gap:6px}
.sbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.7);display:grid;place-items:center;cursor:pointer;font-size:15px;font-weight:800;color:var(--muted)}
.sbtn.on{background:var(--accent);color:#fff;border-color:transparent}
.lead-label{font-size:11.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin:8px 2px 2px}
.title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.title-row .s-title{margin:0}
.pill-add{border-radius:30px;padding:11px 17px;flex:none}
.tile{padding:16px 16px 15px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:transform .15s}
.tile:active{transform:scale(.97)}
.tile-top{display:flex;align-items:center;justify-content:space-between}
.tile-label{font-size:12.5px;font-weight:600;color:var(--muted)}
.ghost-btn{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--accent3);background:rgba(110,84,192,.09);border:1px solid var(--line);flex:none}
.tile-num{font-size:33px;font-weight:800;letter-spacing:-1.6px;line-height:1}
.delta{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;align-self:flex-start;background:rgba(110,84,192,.09);color:var(--accent3);display:inline-flex;align-items:center;gap:4px}
.delta.good{background:rgba(107,168,140,.16);color:var(--good)}.delta.warn{background:rgba(201,154,92,.17);color:var(--warn)}.delta.bad{background:rgba(199,126,150,.16);color:var(--bad)}
.hero-card{padding:18px}
.statpill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:22px}
.statpill.good{background:rgba(107,168,140,.18);color:var(--good)}.statpill.warn{background:rgba(201,154,92,.2);color:var(--warn)}.statpill.bad{background:rgba(199,126,150,.18);color:var(--bad)}
</style>
</head>

function ic(n,s=18,extra=''){return `<svg class="ic-svg ${extra}" viewBox="0 0 24 24" width="${s}" height="${s}" fill="${n==='star'&&extra==='fill'?'currentColor':'none'}" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`}

const BADGES=[{id:"primera",i:"sprout",n:"Primera planta"},{id:"col10",i:"plant",n:"10 plantas"},{id:"col25",i:"tree",n:"25 plantas"},

let state;
function defaultShop(){const mk=(cat,price)=>Object.entries(CATALOG[cat]||{}).map(([id,img])=>{const nm=id.replace(/^[a-z]+-\d+-/,'').replace(/-/g,' ');return {id,name:nm.charAt(0).toUpperCase()+nm.slice(1),price,img,available:true,legendaryOnly:false}});return {macetas:mk('macetas',180),plantas:mk('plantas',220),fondos:[],marcos:[]}}
function freshState(){return {v:5,profile:{name:"Mi jardín",points:0,xp:0,levelIndex:0,streak:0,maxStreak:0,lastLogin:null,avatar:null,locations:["Salón","Cocina","Baño","Balcón","Estantería"],badges:[]},
  plants:[],tasks:[],incubator:[],cemetery:[],inventory:{macetas:[],plantas:[],fondos:[],marcos:[]},shop:defaultShop(),combos:{},counters:{waterTotal:0,promoTotal:0},
  theme:{logo:null,baseIcon:null,incEsqueje:null,incSemilla:null,appName:"Josie",colors:{},fonts:{logo:"",head:"",body:""},customFonts:{},
    text:{logo:{color:"",bold:false,italic:true},head:{color:"",bold:true,italic:false},body:{color:"",bold:false,italic:false}}},log:[]}}
function load(){try{const r=localStorage.getItem('josie_v5');if(r){state=JSON.parse(r);migrate();return}}catch(e){}
  try{const old=localStorage.getItem('josie_v4');if(old){state=JSON.parse(old);state.v=5;if(!state.theme.text)state.theme.text=freshState().theme.text;migrate();return}}catch(e){}
  state=freshState()}
function migrate(){state.plants.forEach(p=>{if(!p.waterLog)p.waterLog=p.lastWater?[p.lastWater]:[]});if(!state.theme.text)state.theme.text=freshState().theme.text}

const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
function dShift(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function daysSince(s){if(!s)return null;return Math.floor((Date.now()-new Date(s+'T00:00').getTime())/86400000)}
function relDay(s){const d=daysSince(s);if(d===null)return"—";if(d<=0)return"hoy";if(d===1)return"ayer";return"hace "+d+" días"}
function fmtDate(s){if(!s)return"—";const[y,m,d]=s.split('-');return d+"/"+m+"/"+y}
function esc(s){return(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function sameMonth(s){if(!s)return false;return s.slice(0,7)===today().slice(0,7)}

function toast(m,c=""){const t=$('#toast');t.className='on '+c;t.innerHTML=(c==='pts'?ic('leaf',15):c==='bad'?ic('alert',15):'')+'<span>'+m+'</span>';clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2000)}
function gain(n,r){state.profile.points+=n;state.profile.xp+=n;state.log.unshift({t:r,n,d:Date.now()});state.log=state.log.slice(0,40);toast("+"+n+" · "+r,"pts");checkLevel();syncHeader()}
function lose(n,r){state.profile.points=Math.max(0,state.profile.points-n);state.log.unshift({t:r,n:-n,d:Date.now()});state.log=state.log.slice(0,40);toast("-"+n+" · "+r,"bad");syncHeader()}
function spend(n){if(state.profile.points<n)return false;state.profile.points-=n;syncHeader();return true}
function levelIndex(xp){let i=0;for(let k=0;k<RANKS.length;k++)if(xp>=RANKS[k].xp)i=k;return i}
function checkLevel(){const ni=levelIndex(state.profile.xp),old=state.profile.levelIndex||0;if(ni>old){const b=PTS.nivel*(ni-old);state.profile.points+=b;state.log.unshift({t:"Subida de nivel a "+RANKS[ni].n,n:b,d:Date.now()});setTimeout(()=>toast("¡Nivel "+RANKS[ni].n+"! +"+b,"pts"),650)}state.profile.levelIndex=ni}
function syncHeader(){$('#ptsPill').innerHTML=ic('leaf',16)+"<span>"+state.profile.points+"</span>";$('#streakPill').innerHTML=ic('flame',16)+"<span>"+state.profile.streak+"</span>"}

function recomputeBadges(){const p=state.profile,P=state.plants,has=id=>p.badges.includes(id),give=id=>{if(!has(id)){p.badges.push(id);setTimeout(()=>toast("Insignia: "+(BADGES.find(b=>b.id===id)||{}).n),950)}};
  if(P.length>=1)give("primera");if(P.length>=10)give("col10");if(P.length>=25)give("col25");if(p.maxStreak>=7)give("racha7");if(p.maxStreak>=30)give("racha30");
  if(P.some(x=>x.legendaryClaimed))give("leg");if(state.counters.promoTotal>=1)give("propagador");if(P.some(x=>x.flowering))give("flor");
  if(P.some(x=>x.name&&x.species&&x.light&&x.location&&x.origin&&x.acquired))give("cientifica");if(Object.values(state.inventory).reduce((a,b)=>a+b.length,0)>=10)give("coleccionista");
  if(p.xp>=2800)give("botanica");if(state.counters.waterTotal>=100)give("cuidadora")}
function dailyLogin(){const t=today();if(state.profile.lastLogin===t)return;if(state.profile.lastLogin===dShift(-1))state.profile.streak+=1;else state.profile.streak=1;
  state.profile.maxStreak=Math.max(state.profile.maxStreak||0,state.profile.streak);state.profile.lastLogin=t;gain(PTS.login,"Inicio de sesión diario");
  if(state.profile.streak===7)gain(PTS.racha7,"Racha de 7 días");if(state.profile.streak===30)gain(PTS.racha30,"Racha de 30 días");recomputeBadges();save()}

function shopImg(cat,id){if(!id)return null;const it=(state.shop[cat]||[]).find(x=>x.id===id);return it?it.img:null}
function baseIcon(){return state.theme.baseIcon||CATALOG.base}
function iconHTML(plant,size){const ic2=plant.icon||{},leg=plant.stage==='legendaria';let L="";const fondo=shopImg('fondos',ic2.fondoId);if(fondo)L+=`<img class="l-bg" src="${fondo}">`;
  const ck=(ic2.potId||'')+'|'+(ic2.plantId||'');if(state.combos[ck])L+=`<img src="${state.combos[ck]}">`;else{const pot=shopImg('macetas',ic2.potId),pl=shopImg('plantas',ic2.plantId);if(pot||pl){if(pot)L+=`<img class="l-pot" src="${pot}">`;if(pl)L+=`<img class="l-plant" src="${pl}">`;}else L+=`<img src="${baseIcon()}">`;}
  const marco=shopImg('marcos',ic2.marcoId);if(marco)L+=`<img src="${marco}">`;return `<div class="picon ${leg?'legend':''}" style="width:${size}px;height:${size}px">${L}</div>`}
function plantHealth(p){if((p.tags||[]).includes('plaga'))return'bad';if((p.tags||[]).includes('estres'))return'warn';if((p.symptoms||[]).length)return'warn';return'good'}

/* NAV */
const NAV=[{k:"inicio",n:"Inicio",ic:'<path d="M3 11l9-8 9 8M5 10v10h14V10"/>'},{k:"plantas",n:"Plantas",ic:'<path d="M4 20c0-9 7-15 16-15 0 9-7 15-16 15z"/><path d="M4 20C7 14 11 11 16 9"/>'},
  {k:"incubadora",n:"Incubar",ic:'<path d="M9 3h6M10 3v6l-4 9a2 2 0 002 2.8h8A2 2 0 0018 18l-4-9V3"/>'},{k:"perfil",n:"Perfil",ic:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>'}];

  items.splice(2,0,`<div class="nav-add" onclick="J.quickAdd()">${ic('plus',26)}</div>`);$('#nav').innerHTML=`<div class="nav-pill">${items.join('')}</div>`}
function show(k,dir){current=k;renderNav();const s=$('#screen');s.classList.remove('anim-up','anim-l','anim-r');void s.offsetWidth;
  ({inicio:scrInicio,plantas:scrPlantas,incubadora:scrIncubadora,tienda:scrTienda,cementerio:scrCementerio,tareas:scrTareas,perfil:scrPerfil}[k]||scrInicio)();
  s.classList.add(dir==='l'?'anim-l':dir==='r'?'anim-r':'anim-up');window.scrollTo(0,0);save()}
function quickAdd(){openModal(`<h3>Añadir</h3>

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{if(e.target.closest('.filters,.phases,.shop-cats,.tabs,input,textarea,.modal,.chart-wrap')){tx=null;return}tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{if(tx===null||$('#overlay').classList.contains('on'))return;const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.6){const i=MAIN.indexOf(current);if(i<0)return;if(dx<0&&i<MAIN.length-1)show(MAIN[i+1],'l');else if(dx>0&&i>0)show(MAIN[i-1],'r')}},{passive:true});

/* Dashboard */
function scrInicio(){const P=state.plants,total=P.length,good=P.filter(p=>plantHealth(p)==='good').length,health=total?Math.round(good/total*100):100;
  const sinRev=P.filter(p=>(daysSince(p.lastReview)||99)>7).length,riesgo=P.filter(p=>plantHealth(p)!=='good').length,pend=state.tasks.filter(t=>!t.done).length,r=state.profile,li=r.levelIndex||0,rank=RANKS[li];
  const hmsg=health>=85?'Muy bien':health>=60?'Bien':health>=35?'Atención':'Cuidado';
  $('#screen').innerHTML=`<div class="lead-label">Resumen</div>
  <div class="title-row"><div class="s-title">Tu jardín</div><button class="btn btn-primary btn-sm pill-add" onclick="J.openPlantForm()">${ic('plus',16)} Planta</button></div>
  <div class="s-sub">${ic(RANK_IC[li],14)} ${rank.n} · ${r.streak} días de racha</div>
  <div class="card hero-card" style="margin-bottom:13px"><div class="lead-label" style="margin:0 0 11px">Salud global</div>
    <div style="display:flex;align-items:center;gap:18px"><div class="ring" style="--p:${health}"><div class="inner">${health}%</div></div>
      <div style="flex:1"><div style="font-weight:800;font-size:19px;letter-spacing:-.4px">${hmsg}</div><div class="mini" style="margin-top:3px">${good} de ${total||0} plantas en buen estado</div>
        <div style="margin-top:12px"><span class="statpill ${health>=60?'good':health>=35?'warn':'bad'}">${ic('flame',12)} ${r.streak} días de racha</span></div></div></div></div>
  <div class="grid2" style="margin-bottom:13px">
    ${tile('Plantas',total,"J.show('plantas')",good+' sanas','good')}
    ${tile('Sin revisar',sinRev,"J.show('plantas')",'+7 días',sinRev?'warn':'good')}
    ${tile('En riesgo',riesgo,"J.show('plantas')",riesgo?'atención':'todo bien',riesgo?'bad':'good')}
    ${tile('Tareas',pend,"J.show('tareas')",pend?'pendientes':'al día',pend?'warn':'good')}</div>
  ${dashChart()}
  <button class="btn btn-primary btn-block" style="margin:2px 0 11px" onclick="J.waterAll()">${ic('water',18)} Regar todo${total?` · ${total}`:''}</button>
  <div class="grid3" style="margin-bottom:6px"><button class="btn btn-soft btn-sm" onclick="J.show('tareas')">${ic('checkc',16)} Tareas</button><button class="btn btn-soft btn-sm" onclick="J.show('tienda')">${ic('bag',16)} Tienda</button><button class="btn btn-soft btn-sm" onclick="J.show('cementerio')">${ic('grave',16)} Memoria</button></div>
  ${pend?`<div class="lead-label" style="margin-top:18px">Próximas tareas</div>`+state.tasks.filter(t=>!t.done).slice(0,3).map(taskRow).join(''):''}
  ${total===0?emptyBox('pot','Aún no tienes plantas','Pulsa «Planta» o el botón + para añadir la primera.'):''}`}
function tile(label,v,act,delta,dcls){return `<div class="card tile" onclick="${act}"><div class="tile-top"><span class="tile-label">${label}</span><span class="ghost-btn">${ic('arrow',14)}</span></div><div class="tile-num">${v}</div>${delta?`<div class="delta ${dcls||''}">${delta}</div>`:''}</div>`}
function dashChart(){const all=[];state.plants.forEach(p=>(p.waterLog||[]).forEach(d=>all.push(d)));if(all.length<2)return '';all.sort();
  const end=Date.now(),nb=8,buckets=new Array(nb).fill(0);
  all.forEach(d=>{const t=new Date(d+'T00:00').getTime();const wAgo=Math.floor((end-t)/(7*86400000));const idx=nb-1-wAgo;if(idx>=0&&idx<nb)buckets[idx]++});
  const max=Math.max(1,...buckets),W=320,H=126,pad=10,bw=(W-pad*2)/nb;let bars='';
  for(let i=0;i<nb;i++){const bh=buckets[i]/max*(H-44),x=pad+i*bw+bw*0.22,y=H-26-bh,w=bw*0.56,hot=i===nb-1&&buckets[i]>0;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(bh,3).toFixed(1)}" rx="5" fill="${hot?'url(#hot)':'url(#cool)'}" ${hot?'filter="url(#glow)"':''}/>`;
    if(buckets[i]>0)bars+=`<text x="${(x+w/2).toFixed(1)}" y="${(y-6).toFixed(1)}" font-size="10" fill="${hot?'#6A4FBE':'#A99BC8'}" font-weight="${hot?'800':'600'}" text-anchor="middle">${buckets[i]}</text>`;
    bars+=`<text x="${(x+w/2).toFixed(1)}" y="${H-8}" font-size="8.5" fill="#A99BC8" text-anchor="middle">S${i+1}</text>`}
  const tot=buckets.reduce((a,b)=>a+b,0);
  return `<div class="card" style="margin-bottom:13px"><div class="lead-label" style="margin:0 0 2px">Tu ritmo</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px"><div style="font-weight:800;font-size:18px;letter-spacing:-.3px">Riegos por semana</div><span class="delta">${tot} en 8 sem.</span></div>
    <div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><defs>
      <linearGradient id="cool" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C8B9EE"/><stop offset="1" stop-color="#E6DEF6"/></linearGradient>
      <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9277D6"/><stop offset="1" stop-color="#6A4FBE"/></linearGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <line x1="${pad}" y1="${H-26}" x2="${W-pad}" y2="${H-26}" stroke="#EBE4F7" stroke-width="1"/>${bars}</svg></div></div>`}
function stat(icon,v,l,cls,act){return`<div class="card stat ${act?'tap':''}" ${act?`onclick="${act}"`:''}><div class="ic">${ic(icon,22)}</div><div class="v" style="${cls==='bad'?'color:var(--bad)':cls==='warn'?'color:var(--warn)':''}">${v}</div><div class="l">${l}</div></div>`}
function emptyBox(icon,t,s){return`<div class="empty"><div class="e">${ic(icon,46)}</div><p>${t}</p><div class="mini">${s}</div></div>`}

/* Mis plantas */
let plantFilter="todas",plantSearch="";
function scrPlantas(){let P=state.plants.slice();if(plantSearch)P=P.filter(p=>(p.name||'').toLowerCase().includes(plantSearch.toLowerCase()));
  if(plantFilter==='favoritas')P=P.filter(p=>p.favorite);if(plantFilter==='riesgo')P=P.filter(p=>plantHealth(p)!=='good');if(plantFilter==='floracion')P=P.filter(p=>p.flowering);
  const g={};P.forEach(p=>{const l=p.location||'Sin ubicación';(g[l]=g[l]||[]).push(p)});
  const body=state.plants.length===0?emptyBox('sprout','Tu jardín está vacío','Añade tu primera planta con el botón +.'):(P.length===0?emptyBox('search','Sin resultados','Prueba otro filtro o búsqueda.'):Object.keys(g).sort().map(l=>`<div class="group-h line">${esc(l)}</div>`+g[l].map(plantCard).join('')).join(''));
  const fl=[['todas','Todas'],['favoritas','Favoritas'],['riesgo','En riesgo'],['floracion','Floración']];
  $('#screen').innerHTML=`<div class="lead-label">Colección</div><div class="s-title">Mis plantas</div><div class="s-sub">${state.plants.length} en tu colección</div>
  <input class="search" placeholder="Buscar planta..." value="${esc(plantSearch)}" oninput="J.setSearch(this.value)">
  <div class="filters">${fl.map(f=>`<div class="fil ${plantFilter===f[0]?'on':''}" onclick="J.setFilter('${f[0]}')">${f[1]}</div>`).join('')}</div>${body}`}
function setSearch(v){plantSearch=v;scrPlantas();const i=$('.search');if(i){i.focus();i.setSelectionRange(v.length,v.length)}}
function setFilter(f){plantFilter=f;scrPlantas()}
function plantCard(p){const h=plantHealth(p),rev=daysSince(p.lastReview);
  return`<div class="card plant-card" onclick="J.openPlant('${p.id}')"><div class="pc-actions">
      <span class="${p.favorite?'fav-on':''}" onclick="event.stopPropagation();J.toggleFav('${p.id}')">${ic('star',18,p.favorite?'fill':'')}</span>
      <span onclick="event.stopPropagation();J.plantMenu('${p.id}')">${ic('dots',18)}</span></div>
    <div class="pic">${iconHTML(p,64)}</div>
    <div class="pc-body"><div class="pc-name">${esc(p.name||'Sin nombre')} ${p.stage==='legendaria'?`<span class="chip gold">${ic('crown',12)}</span>`:''}</div>
      <div class="pc-meta">${p.species?'<span>'+esc(p.species)+'</span>':''}<span>${ic('water',13)} ${relDay(p.lastWater)}</span></div>
      <div class="pc-meta" style="margin-top:7px"><span class="chip ${h}">${h==='good'?'Sana':h==='warn'?'Atención':'En riesgo'}</span>${p.flowering?`<span class="chip warn">Floración</span>`:''}${(rev===null||rev>7)?`<span class="chip">Revisar</span>`:''}</div></div></div>`}
function toggleFav(id){const p=state.plants.find(x=>x.id===id);p.favorite=!p.favorite;save();scrPlantas()}
function plantMenu(id){const p=state.plants.find(x=>x.id===id);openModal(`<h3>${esc(p.name||'Planta')}</h3>
  <div class="sheet-btn" onclick="J.closeModal();J.openPlant('${id}')"><span class="ico">${ic('eye',20)}</span> Abrir ficha</div>
  <div class="sheet-btn" onclick="J.closeModal();J.openPlantForm('${id}')"><span class="ico">${ic('pencil',20)}</span> Editar</div>
  <div class="sheet-btn" onclick="J.closeModal();J.killPlant('${id}')"><span class="ico">${ic('grave',20)}</span> Mover al cementerio</div>
  <div class="sheet-btn danger" onclick="J.closeModal();J.deletePlant('${id}')"><span class="ico">${ic('trash',20)}</span> Eliminar definitivamente</div>`)}

/* Ficha */
let fichaTab="identidad";
function openPlant(id){fichaTab="identidad";renderFicha(id)}
function renderFicha(id){const p=state.plants.find(x=>x.id===id);if(!p)return show('plantas');const content=fichaTab==='identidad'?fichaIdentidad(p):fichaTab==='estado'?fichaEstado(p):fichaFase(p);
  openModal(`<div style="position:relative;text-align:center;margin-bottom:4px"><div style="display:inline-block">${iconHTML(p,118)}</div>
      <div class="pencil" style="right:calc(50% - 76px);top:82px" onclick="J.openIconPicker('${p.id}')">${ic('brush',18)}</div></div>
    <h3 style="text-align:center;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:7px">${esc(p.name||'Sin nombre')} ${p.favorite?`<span style="color:var(--gold)">${ic('star',16,'fill')}</span>`:''}</h3>
    <div class="tabs">${['identidad','estado','fase'].map(t=>`<div class="tab ${fichaTab===t?'on':''}" onclick="J.fichaTabSet('${id}','${t}')">${({identidad:'Identidad',estado:'Estado',fase:'Fase vital'})[t]}</div>`).join('')}</div>${content}
    <div class="row" style="margin-top:18px"><button class="btn btn-soft" onclick="J.openPlantForm('${p.id}')">${ic('pencil',16)} Editar</button><button class="btn btn-bad" onclick="J.killPlant('${p.id}')">${ic('grave',16)} Cementerio</button></div>
    <button class="btn btn-ghost btn-block" style="margin-top:8px;color:var(--bad)" onclick="J.deletePlant('${p.id}')">${ic('trash',16)} Eliminar definitivamente</button>`)}
function fichaTabSet(id,t){fichaTab=t;renderFicha(id)}
function fichaIdentidad(p){const f=(l,v)=>`<div class="field"><label>${l}</label><div class="val">${v||'—'}</div></div>`;
  return `${p.photo?`<div class="photo-box"><img src="${p.photo}"></div><div class="row" style="margin-bottom:14px"><button class="btn btn-soft btn-sm" onclick="J.addPhoto('${p.id}')">${ic('camera',15)} Cambiar foto</button><button class="btn btn-bad btn-sm" onclick="J.removePhoto('${p.id}')">${ic('trash',15)} Quitar foto</button></div>`:`<button class="btn btn-soft btn-block" style="margin-bottom:14px" onclick="J.addPhoto('${p.id}')">${ic('camera',16)} Añadir foto real</button>`}
    <div class="mini" style="margin:-6px 2px 14px">El icono identifica a la planta en toda la app; la foto solo se ve aquí dentro.</div>
    <div class="grid2">${f('Especie',esc(p.species))}${f('Iluminación',esc(p.light))}${f('Ubicación',esc(p.location))}${f('Origen',esc(p.origin))}</div>${f('Adquisición',fmtDate(p.acquired))}
    ${p.notes?`<div class="field"><label>Notas</label><div class="val" style="font-weight:500">${esc(p.notes)}</div></div>`:''}`}
function fichaEstado(p){return `<div class="card" style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="mini">Último riego</div><div style="font-weight:800;font-size:16px">${relDay(p.lastWater)}</div><div class="mini">${(p.waterLog||[]).length} riegos · ${fmtDate(p.lastWater)}</div></div>
    <button class="btn btn-primary btn-sm" onclick="J.water('${p.id}')">${ic('water',15)} Regado hoy</button></div>
    <input type="date" class="inp" style="margin-top:11px" value="${p.lastWater||''}" onchange="J.setWater('${p.id}',this.value)"></div>
  <div class="card" style="margin-bottom:11px"><div style="font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:7px;color:var(--accent3)">${ic('chart',18)} Historial de riego</div><div class="chart-wrap">${waterChart(p)}</div></div>
  <div class="card" style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="mini">Último abonado</div><div style="font-weight:800;font-size:16px">${relDay(p.lastFert)}</div><div class="mini">${fmtDate(p.lastFert)}</div></div>
    <button class="btn btn-primary btn-sm" onclick="J.fert('${p.id}')">${ic('fert',15)} Abonado hoy</button></div>
    <input type="date" class="inp" style="margin-top:11px" value="${p.lastFert||''}" onchange="J.setFert('${p.id}',this.value)"></div>
  <div class="grid2" style="margin-bottom:11px"><div class="card"><div class="mini">Trasplante</div><div style="font-weight:700">${relDay(p.lastTransplant)}</div><button class="btn btn-soft btn-sm" style="margin-top:8px;width:100%" onclick="J.transplant('${p.id}')">${ic('pot',15)} Hoy</button></div>
    <div class="card"><div class="mini">Limpieza</div><div style="font-weight:700">${relDay(p.lastClean)}</div><button class="btn btn-soft btn-sm" style="margin-top:8px;width:100%" onclick="J.cleanPlant('${p.id}')">${ic('sparkle',15)} Limpiar +5</button></div></div>
  <div class="togrow"><div style="display:flex;align-items:center;gap:9px">${ic('flower',18,'')}<div><div style="font-weight:700">En floración</div><div class="mini">Marca si está florecida</div></div></div><div class="toggle ${p.flowering?'on':''}" onclick="J.toggleFlower('${p.id}')"></div></div>
  <button class="btn btn-soft btn-block" style="margin:13px 0" onclick="J.review('${p.id}')">${ic('eye',16)} Marcar como revisada hoy</button>
  <div class="field"><label>Etiquetas de salud</label><div class="tagrow">${TAGS.map(t=>`<div class="tagsel ${(p.tags||[]).includes(t.k)?'on '+t.c:''}" onclick="J.toggleTag('${p.id}','${t.k}')">${t.n}</div>`).join('')}</div></div>
  <div class="field"><label>Síntomas</label><div class="tagrow">${SYMPT.map(s=>`<div class="tagsel ${(p.symptoms||[]).includes(s)?'on warn':''}" onclick="J.toggleSympt('${p.id}','${esc(s)}')">${s}</div>`).join('')}</div></div>
  <div class="field"><label>Notas / alertas</label><textarea class="inp" oninput="J.setNotes('${p.id}',this.value)" placeholder="Ej: últimamente bebe mucha agua...">${esc(p.notes)}</textarea></div>`}
function fichaFase(p){return `<div class="mini" style="margin-bottom:11px">Selecciona la fase actual de tu planta (a tu criterio).</div>
  <div class="phases">${PHASES.map(f=>`<div class="phase ${p.stage===f.k?'on':''} ${f.k==='legendaria'?'leg':''}" onclick="J.setPhase('${p.id}','${f.k}')"><div class="e">${ic(f.i,22)}</div><div class="n">${f.n}</div></div>`).join('')}</div>
  <div class="card" style="margin-top:12px"><div style="font-weight:800;margin-bottom:8px">Leyenda orientativa</div>
    ${PHASES.map((f,idx)=>[f.i,f.n,['aún sin germinar','primer brote / raíz','2 hojas pequeñas','varias hojas, crece rápido','tamaño definitivo','un hito excepcional'][idx]]).map(r=>`<div style="display:flex;gap:10px;padding:5px 0;font-size:13px;align-items:center"><span style="color:var(--accent3)">${ic(r[0],18)}</span><b style="min-width:78px">${r[1]}</b><span class="mini">${r[2]}</span></div>`).join('')}</div>
  ${p.stage==='legendaria'?`<div class="card" style="margin-top:10px;border-color:var(--gold);background:rgba(194,162,74,.08)"><b style="color:#8a6f1f;display:flex;align-items:center;gap:6px">${ic('crown',16)} Planta legendaria</b><div class="mini" style="margin-top:4px">${p.legendaryClaimed?'Bonus de +150 ya concedido (no se repite).':''}</div></div>`:''}`}

function waterChart(p){const log=(p.waterLog||[]).slice().filter(Boolean).sort();if(log.length<1)return `<div class="mini" style="padding:6px 0">Riega la planta para empezar a ver su historial.</div>`;
  const start=(p.acquired&&p.acquired<log[0])?p.acquired:log[0],startMs=new Date(start+'T00:00').getTime(),end=Date.now();
  const weeksTotal=Math.max(1,Math.ceil((end-startMs)/(7*86400000))),nb=Math.min(weeksTotal,8),buckets=new Array(nb).fill(0);
  log.forEach(d=>{const t=new Date(d+'T00:00').getTime();const wAgo=Math.floor((end-t)/(7*86400000));const idx=nb-1-wAgo;if(idx>=0&&idx<nb)buckets[idx]++});
  const max=Math.max(1,...buckets),W=300,H=96,pad=6,bw=(W-pad*2)/nb;let bars="";
  for(let i=0;i<nb;i++){const bh=buckets[i]/max*(H-34),x=pad+i*bw+bw*0.18,y=H-18-bh,w=bw*0.64,ly=Math.max(y-4,11),hot=i===nb-1&&buckets[i]>0;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(bh,2).toFixed(1)}" rx="4" fill="${hot?'url(#whot)':'url(#wcool)'}" ${hot?'filter="url(#wglow)"':''}/>`;
    if(buckets[i]>0)bars+=`<text x="${(x+w/2).toFixed(1)}" y="${ly.toFixed(1)}" font-size="9" fill="${hot?'#6A4FBE':'#A99BC8'}" font-weight="${hot?'800':'600'}" text-anchor="middle">${buckets[i]}</text>`;
    bars+=`<text x="${(x+w/2).toFixed(1)}" y="${H-4}" font-size="8" fill="#A99BC8" text-anchor="middle">S${i+1}</text>`}
  let inter=[];for(let i=1;i<log.length;i++)inter.push((new Date(log[i])-new Date(log[i-1]))/86400000);
  const avg=inter.length?(inter.reduce((a,b)=>a+b,0)/inter.length):null;let trend="";
  if(inter.length>=2){const h=Math.ceil(inter.length/2),a1=inter.slice(0,h),a2=inter.slice(h),m1=a1.reduce((a,b)=>a+b,0)/a1.length,m2=a2.reduce((a,b)=>a+b,0)/a2.length;
    trend=m2<m1-0.6?'Últimamente riegas con más frecuencia':m2>m1+0.6?'Estás espaciando más los riegos':'Ritmo de riego estable'}
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><defs>
    <linearGradient id="wcool" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C8B9EE"/><stop offset="1" stop-color="#E6DEF6"/></linearGradient>
    <linearGradient id="whot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9277D6"/><stop offset="1" stop-color="#6A4FBE"/></linearGradient>
    <filter id="wglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <line x1="${pad}" y1="${H-18}" x2="${W-pad}" y2="${H-18}" stroke="#EBE4F7" stroke-width="1"/>${bars}</svg>
    <div class="mini" style="margin-top:6px">${log.length} riegos · ${avg!=null?`cada ~${avg.toFixed(1)} días`:'sigue regando para ver la media'}${trend?` · <b style="color:var(--accent3)">${trend}</b>`:''}</div>`}

function logWater(p,date){p.waterLog=p.waterLog||[];if(!p.waterLog.includes(date))p.waterLog.push(date)}
function water(id){const p=state.plants.find(x=>x.id===id);p.lastWater=today();logWater(p,today());state.counters.waterTotal++;gain(PTS.regar,"Regar planta");recomputeBadges();save();renderFicha(id)}
function setWater(id,v){const p=state.plants.find(x=>x.id===id);p.lastWater=v;if(v)logWater(p,v);p.waterLog=(p.waterLog||[]).sort();save();renderFicha(id)}
function fert(id){const p=state.plants.find(x=>x.id===id);if(p.lastFert&&sameMonth(p.lastFert)){toast("Ya abonada este mes","bad");return}p.lastFert=today();gain(PTS.abonar,"Abonar planta");save();renderFicha(id)}
function setFert(id,v){const p=state.plants.find(x=>x.id===id);p.lastFert=v;save();renderFicha(id)}
function transplant(id){const p=state.plants.find(x=>x.id===id);p.lastTransplant=today();toast("Trasplante registrado");save();renderFicha(id)}
function cleanPlant(id){const p=state.plants.find(x=>x.id===id);p.lastClean=today();gain(PTS.limpiar,"Limpiar planta");save();renderFicha(id)}
function review(id){const p=state.plants.find(x=>x.id===id);p.lastReview=today();toast("Revisada");save();renderFicha(id)}
function toggleFlower(id){const p=state.plants.find(x=>x.id===id);p.flowering=!p.flowering;if(p.flowering&&!(p.tags||[]).includes('floracion'))(p.tags=p.tags||[]).push('floracion');recomputeBadges();save();renderFicha(id)}
function toggleTag(id,k){const p=state.plants.find(x=>x.id===id);p.tags=p.tags||[];const i=p.tags.indexOf(k);i<0?p.tags.push(k):p.tags.splice(i,1);if(k==='floracion')p.flowering=p.tags.includes('floracion');save();renderFicha(id)}
function toggleSympt(id,s){const p=state.plants.find(x=>x.id===id);p.symptoms=p.symptoms||[];const i=p.symptoms.indexOf(s);i<0?p.symptoms.push(s):p.symptoms.splice(i,1);save();renderFicha(id)}
function setNotes(id,v){const p=state.plants.find(x=>x.id===id);p.notes=v;save()}
function setPhase(id,k){const p=state.plants.find(x=>x.id===id);p.stage=k;if(k==='legendaria'&&!p.legendaryClaimed){p.legendaryClaimed=true;gain(PTS.legendaria,"¡Planta legendaria!");recomputeBadges()}
  if(k!=='legendaria'&&p.icon&&p.icon.marcoId){const m=(state.shop.marcos||[]).find(x=>x.id===p.icon.marcoId);if(m&&m.legendaryOnly)p.icon.marcoId=null}save();renderFicha(id)}
function addPhoto(id){pickFile(d=>{const p=state.plants.find(x=>x.id===id);p.photo=d;save();renderFicha(id);toast("Foto añadida")})}
function removePhoto(id){const p=state.plants.find(x=>x.id===id);p.photo=null;save();renderFicha(id);toast("Foto quitada")}
function killPlant(id){const p=state.plants.find(x=>x.id===id);openModal(`<h3>Mover al cementerio</h3><div class="mini" style="margin-bottom:14px">${esc(p.name)} se moverá al cementerio conservando su recuerdo.</div>
  <div class="field"><label>Motivo</label><input id="kreason" class="inp" placeholder="Ej: exceso de riego"></div><button class="btn btn-bad btn-block" onclick="J.confirmKill('${id}')">Confirmar</button>`)}
function confirmKill(id){const i=state.plants.findIndex(x=>x.id===id),p=state.plants[i];state.cemetery.unshift({id:uid(),name:p.name,reason:($('#kreason').value||'—'),born:p.acquired,died:today(),icon:JSON.parse(JSON.stringify(p.icon||{})),stage:p.stage,photo:p.photo});state.plants.splice(i,1);save();closeModal();toast("Movida al cementerio");show('plantas')}
function deletePlant(id){const p=state.plants.find(x=>x.id===id);confirmModal("Eliminar planta","¿Eliminar «"+esc(p.name||'')+"» para siempre? No pasará por el cementerio.",()=>{state.plants=state.plants.filter(x=>x.id!==id);save();closeModal();toast("Planta eliminada");show('plantas')},true)}
function openPlantForm(id){const p=id?state.plants.find(x=>x.id===id):{name:'',species:'',light:'',location:state.profile.locations[0]||'',origin:'',acquired:today()};
  const locOpts=state.profile.locations.map(l=>`<option ${p.location===l?'selected':''}>${esc(l)}</option>`).join(''),litOpts=LIGHT.map(l=>`<option ${p.light===l?'selected':''}>${l}</option>`).join('');
  openModal(`<h3>${id?'Editar planta':'Nueva planta'}</h3><div class="field"><label>Nombre *</label><input id="f_name" class="inp" value="${esc(p.name)}" placeholder="Ej: Monstera del salón"></div>
    <div class="field"><label>Especie</label><input id="f_species" class="inp" value="${esc(p.species)}" placeholder="Monstera deliciosa"></div>
    <div class="row"><div class="field"><label>Iluminación</label><select id="f_light" class="inp"><option value="">—</option>${litOpts}</select></div><div class="field"><label>Ubicación</label><select id="f_location" class="inp">${locOpts}<option value="__new">+ Nueva...</option></select></div></div>
    <div class="row"><div class="field"><label>Origen</label><input id="f_origin" class="inp" value="${esc(p.origin)}" placeholder="Vivero / esqueje"></div><div class="field"><label>Adquisición</label><input id="f_acquired" type="date" class="inp" value="${p.acquired||today()}"></div></div>
    <button class="btn btn-primary btn-block" onclick="J.savePlant('${id||''}')">${id?'Guardar':'Crear planta'}</button>`);
  $('#f_location').onchange=function(){if(this.value==='__new'){this.value=state.profile.locations[0];inputModal("Nueva ubicación",[{id:'loc',label:'Nombre',placeholder:'Ej: Estantería 2'}],v=>{if(v.loc){state.profile.locations.push(v.loc);save();$('#f_location').innerHTML=state.profile.locations.map(l=>`<option ${l===v.loc?'selected':''}>${esc(l)}</option>`).join('')+'<option value="__new">+ Nueva...</option>'}})}}}
function savePlant(id){const g=s=>$('#'+s).value;if(!g('f_name').trim()){toast("Ponle un nombre","bad");return}
  if(id){const p=state.plants.find(x=>x.id===id);Object.assign(p,{name:g('f_name'),species:g('f_species'),light:g('f_light'),location:g('f_location'),origin:g('f_origin'),acquired:g('f_acquired')});save();closeModal();renderFicha(id)}
  else{state.plants.unshift({id:uid(),name:g('f_name'),species:g('f_species'),light:g('f_light'),location:g('f_location'),origin:g('f_origin'),acquired:g('f_acquired'),icon:{potId:null,plantId:null,fondoId:null,marcoId:null},lastWater:null,lastFert:null,lastTransplant:null,lastClean:null,lastReview:today(),flowering:false,tags:['sana'],symptoms:[],notes:'',stage:'bebe',legendaryClaimed:false,favorite:false,waterLog:[],photo:null});recomputeBadges();save();closeModal();toast("Planta añadida");show('plantas')}}

function openIconPicker(id){const p=state.plants.find(x=>x.id===id),ic2=p.icon=p.icon||{};
  const cat=(label,key,prop)=>{const owned=state.inventory[key]||[];let items=(state.shop[key]||[]).filter(it=>owned.includes(it.id));if(key==='marcos')items=items.filter(it=>!it.legendaryOnly||p.stage==='legendaria');
    const cells=items.map(it=>`<div class="phase ${ic2[prop]===it.id?'on':''}" style="min-width:80px" onclick="J.setIconPart('${id}','${prop}','${it.id}')"><div style="width:56px;height:56px;margin:0 auto">${miniImg(it.img)}</div><div class="n">${esc(it.name)}</div></div>`).join('');
    return `<div class="field"><label>${label}</label><div class="phases"><div class="phase ${!ic2[prop]?'on':''}" style="min-width:80px" onclick="J.setIconPart('${id}','${prop}','')"><div class="e">${ic('ban',22)}</div><div class="n">Ninguno</div></div>${cells||`<div class="mini" style="padding:14px">Compra en la tienda</div>`}</div></div>`};
  openModal(`<h3>Personalizar icono</h3><div style="text-align:center;margin-bottom:8px">${iconHTML(p,112)}</div>${cat('Forma de planta','plantas','plantId')}${cat('Maceta','macetas','potId')}${cat('Fondo','fondos','fondoId')}${cat('Marco','marcos','marcoId')}<button class="btn btn-primary btn-block" style="margin-top:8px" onclick="J.renderFicha('${id}')">Listo</button>`)}
function miniImg(src){return`<div class="picon" style="width:56px;height:56px"><img src="${src}"></div>`}
function setIconPart(id,prop,val){const p=state.plants.find(x=>x.id===id);p.icon[prop]=val||null;save();openIconPicker(id)}

/* Tareas */
function scrTareas(){const pend=state.tasks.filter(t=>!t.done),done=state.tasks.filter(t=>t.done);
  $('#screen').innerHTML=`<div class="lead-label">Cuidados</div><div class="s-title">Tareas</div><div class="s-sub">${pend.length} pendientes</div>${pend.length?pend.map(taskRow).join(''):emptyBox('checkc','Sin tareas pendientes','Pulsa + para añadir una tarea.')}${done.length?`<div class="group-h line">Completadas</div>`+done.map(taskRow).join(''):''}`}
function taskRow(t){const pl=t.plantId?state.plants.find(p=>p.id===t.plantId):null;
  return`<div class="card list-row"><div class="check ${t.done?'on':''}" onclick="J.toggleTask('${t.id}')">${ic('check',16)}</div><div class="grow"><div style="font-weight:700" class="${t.done?'strike':''}">${esc(t.text)}</div><div class="mini" style="display:flex;align-items:center;gap:5px;margin-top:2px">${pl?ic('leaf',12)+' '+esc(pl.name)+' · ':''}${t.due?ic('calendar',12)+' '+fmtDate(t.due):'sin fecha'}</div></div><span class="icon-btn" onclick="J.deleteTask('${t.id}')">${ic('trash',18)}</span></div>`}
function toggleTask(id){const t=state.tasks.find(x=>x.id===id);if(!t.done){t.done=true;t.doneDate=today();gain(PTS.tarea,"Tarea completada")}else t.done=false;save();scrTareas()}
function deleteTask(id){state.tasks=state.tasks.filter(x=>x.id!==id);save();scrTareas();toast("Tarea eliminada")}
function openTaskForm(){const popts='<option value="">— Ninguna —</option>'+state.plants.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  openModal(`<h3>Nueva tarea</h3><div class="field"><label>Tarea *</label><input id="t_text" class="inp" placeholder="Ej: aplicar insecticida"></div><div class="row"><div class="field"><label>Planta</label><select id="t_plant" class="inp">${popts}</select></div><div class="field"><label>Fecha</label><input id="t_due" type="date" class="inp" value="${today()}"></div></div><button class="btn btn-primary btn-block" onclick="J.saveTask()">Crear tarea</button>`)}
function saveTask(){const txt=$('#t_text').value.trim();if(!txt){toast("Escribe la tarea","bad");return}state.tasks.unshift({id:uid(),text:txt,plantId:$('#t_plant').value||null,due:$('#t_due').value,done:false});save();closeModal();show('tareas')}

/* Incubadora */
function incIcon(it){const ov=it.type==='esqueje'?state.theme.incEsqueje:state.theme.incSemilla;if(ov)return`<img src="${ov}">`;return `<span style="color:${it.type==='esqueje'?'var(--accent3)':'var(--good)'}">${ic(it.type==='esqueje'?'scissors':'seed',30)}</span>`}
function scrIncubadora(){const I=state.incubator;$('#screen').innerHTML=`<div class="lead-label">Propagación</div><div class="s-title">Incubadora</div><div class="s-sub">${I.length} propagaciones en curso</div>${I.length?I.map(incCard).join(''):emptyBox('flask','Incubadora vacía','Añade un esqueje o una semilla con el botón +.')}`}
function incCard(it){const stages=it.type==='esqueje'?['Cortado','Enraizando','Listo']:['Sembrada','Germinada','Enraizando','Lista'];const idx=Math.min(it.stage||0,stages.length-1),pct=Math.round(idx/(stages.length-1)*100);
  return`<div class="card inc-card" onclick="J.openInc('${it.id}')"><div class="inc-ic">${incIcon(it)}</div><div style="flex:1;min-width:0"><div style="font-weight:800">${esc(it.name)}</div>
    <div class="mini" style="display:flex;align-items:center;gap:5px">${ic(it.type==='esqueje'?'scissors':'seed',12)} ${it.type==='esqueje'?'Esqueje':'Semilla'} · ${relDay(it.start)} · raíz ~${it.root||0} cm</div>
    <div class="mini" style="margin-top:3px;color:var(--accent3);font-weight:700">${stages[idx]}</div><div class="progress"><i style="width:${pct}%"></i></div></div></div>`}
function openInc(id){const it=state.incubator.find(x=>x.id===id),stages=it.type==='esqueje'?['Cortado','Enraizando','Listo']:['Sembrada','Germinada','Enraizando','Lista'];
  openModal(`<h3 style="display:flex;align-items:center;gap:8px">${ic(it.type==='esqueje'?'scissors':'seed',20)} ${esc(it.name)}</h3>
    <div class="field"><label>Estado</label><div class="phases">${stages.map((s,i)=>`<div class="phase ${(it.stage||0)===i?'on':''}" onclick="J.setIncStage('${id}',${i})"><div class="n">${s}</div></div>`).join('')}</div></div>
    <div class="field"><label>Longitud de raíz (cm)</label><input type="number" class="inp" value="${it.root||0}" oninput="J.setIncRoot('${id}',this.value)"></div>
    <button class="btn btn-primary btn-block" style="margin-bottom:8px" onclick="J.promote('${id}')">${ic('sprout',16)} Promocionar a planta · +${PTS.promo}</button>
    <div class="row"><button class="btn btn-bad" onclick="J.incDie('${id}')">${ic('skull',16)} Murió · -${PTS.muerte}</button><button class="btn btn-ghost" onclick="J.incDelete('${id}')">${ic('trash',16)} Quitar</button></div>`)}
function setIncStage(id,i){const it=state.incubator.find(x=>x.id===id);it.stage=i;save();openInc(id)}
function setIncRoot(id,v){const it=state.incubator.find(x=>x.id===id);it.root=+v;save()}
function promote(id){const i=state.incubator.findIndex(x=>x.id===id),it=state.incubator[i];state.plants.unshift({id:uid(),name:it.name,species:'',light:'',location:state.profile.locations[0]||'',origin:it.type==='esqueje'?'Esqueje propio':'Semilla propia',acquired:today(),icon:{potId:null,plantId:null,fondoId:null,marcoId:null},lastWater:null,lastFert:null,lastTransplant:null,lastClean:null,lastReview:today(),flowering:false,tags:['sana'],symptoms:[],notes:'Promocionada desde incubadora',stage:'bebe',legendaryClaimed:false,favorite:false,waterLog:[],photo:null});state.incubator.splice(i,1);state.counters.promoTotal++;gain(PTS.promo,"Propagación promocionada");recomputeBadges();save();closeModal();toast("¡Es una planta!");show('plantas')}
function incDie(id){state.incubator=state.incubator.filter(x=>x.id!==id);lose(PTS.muerte,"Propagación perdida");save();closeModal();show('incubadora')}
function incDelete(id){state.incubator=state.incubator.filter(x=>x.id!==id);save();closeModal();show('incubadora')}
function openIncForm(){window._incType='esqueje';openModal(`<h3>Nueva propagación</h3><div class="field"><label>Tipo</label><div class="phases" id="incType">
    <div class="phase on" onclick="J.pickIncType(this,'esqueje')"><div class="e">${ic('scissors',22)}</div><div class="n">Esqueje</div></div>
    <div class="phase" onclick="J.pickIncType(this,'semilla')"><div class="e">${ic('seed',22)}</div><div class="n">Semilla</div></div></div></div>
    <div class="field"><label>Nombre *</label><input id="i_name" class="inp" placeholder="Ej: Esqueje de Pothos"></div>
    <div class="mini" style="margin-bottom:14px">Un <b>esqueje</b> es un trozo de una planta que ya tienes. Una <b>semilla</b> nace de cero.</div>
    <button class="btn btn-primary btn-block" onclick="J.saveInc()">Añadir · +${PTS.nuevaInc}</button>`)}
function pickIncType(el,t){document.querySelectorAll('#incType .phase').forEach(p=>p.classList.remove('on'));el.classList.add('on');window._incType=t}
function saveInc(){const n=$('#i_name').value.trim();if(!n){toast("Ponle nombre","bad");return}state.incubator.unshift({id:uid(),type:window._incType||'esqueje',name:n,start:today(),stage:0,root:0});gain(PTS.nuevaInc,"Nueva propagación");recomputeBadges();save();closeModal();show('incubadora')}

/* Tienda */
let shopCat="macetas";
function scrTienda(){const cats=[['macetas','pot','Macetas'],['plantas','leaf','Plantas'],['fondos','image','Fondos'],['marcos','frame','Marcos']];const owned=state.inventory[shopCat]||[],items=(state.shop[shopCat]||[]).filter(it=>it.available);
  $('#screen').innerHTML=`<div class="lead-label">Recompensas</div><div class="s-title">Tienda</div><div class="s-sub">Saldo: <b style="color:var(--accent3);display:inline-flex;align-items:center;gap:3px">${ic('leaf',13)} ${state.profile.points}</b> · todo cosmético</div>
  <div class="shop-cats">${cats.map(c=>`<div class="fil ${shopCat===c[0]?'on':''}" onclick="J.setShopCat('${c[0]}')">${ic(c[1],14)} ${c[2]}</div>`).join('')}</div>
  ${items.length?`<div class="shop-grid">${items.map(it=>shopItem(it,owned.includes(it.id))).join('')}</div>`:emptyBox('bag','Aún no hay artículos aquí','Se añaden desde el panel secreto.')}`}
function setShopCat(c){shopCat=c;scrTienda()}
function shopItem(it,owned){return`<div class="card shop-item"><div class="pic">${miniImg(it.img)}</div><div class="nm">${esc(it.name)}</div>${it.legendaryOnly?`<span class="chip gold">${ic('crown',12)} Legendaria</span>`:''}${owned?`<span class="owned-badge">${ic('check',13)} En tu armario</span>`:`<div class="pr">${ic('leaf',13)} ${it.price}</div><button class="btn ${state.profile.points>=it.price?'btn-primary':'btn-soft'} btn-sm btn-block" onclick="J.buy('${shopCat}','${it.id}')">Comprar</button>`}</div>`}
function buy(cat,id){const it=state.shop[cat].find(x=>x.id===id);if((state.inventory[cat]||[]).includes(id)){toast("Ya lo tienes");return}if(!spend(it.price)){toast("Puntos insuficientes","bad");return}state.inventory[cat].push(id);recomputeBadges();save();scrTienda();toast("¡Comprado! Aplícalo desde una planta")}

/* Cementerio */
function scrCementerio(){const C=state.cemetery;$('#screen').innerHTML=`<div class="lead-label">En memoria</div><div class="s-title">Cementerio</div><div class="s-sub">En memoria · ${C.length}</div>
  <button class="btn btn-soft btn-block" style="margin-bottom:14px" onclick="J.openGraveForm()">${ic('plus',16)} Añadir recuerdo antiguo</button>
  ${C.length?`<div class="grid2">${C.map(graveCard).join('')}</div>`:emptyBox('grave','Cementerio vacío','Aquí se guardarán tus plantas perdidas.')}`}
function graveCard(g){return`<div class="grave" onclick="J.openGrave('${g.id}')"><div class="cross">${ic('grave',16)}</div><div class="pic">${iconHTML({icon:g.icon||{},stage:g.stage},56)}</div><div class="nm">${esc(g.name)}</div><div class="dt">${fmtDate(g.died)}</div></div>`}
function openGrave(id){const g=state.cemetery.find(x=>x.id===id);openModal(`<h3>${esc(g.name)}</h3><div class="field"><label>Motivo</label><div class="val">${esc(g.reason||'—')}</div></div>
  <div class="row"><div class="field"><label>Desde</label><div class="val">${fmtDate(g.born)}</div></div><div class="field"><label>Hasta</label><div class="val">${fmtDate(g.died)}</div></div></div>
  <button class="btn btn-soft btn-block" style="margin-bottom:8px" onclick="J.restoreGrave('${id}')">${ic('refresh',16)} Devolver a Mis plantas</button><button class="btn btn-bad btn-block" onclick="J.removeGrave('${id}')">${ic('trash',16)} Eliminar del cementerio</button>`)}
function restoreGrave(id){const i=state.cemetery.findIndex(x=>x.id===id),g=state.cemetery[i];state.plants.unshift({id:uid(),name:g.name,species:'',light:'',location:state.profile.locations[0]||'',origin:'',acquired:g.born||today(),icon:g.icon||{potId:null,plantId:null,fondoId:null,marcoId:null},lastWater:null,lastFert:null,lastTransplant:null,lastClean:null,lastReview:today(),flowering:false,tags:['sana'],symptoms:[],notes:'',stage:g.stage||'adulta',legendaryClaimed:false,favorite:false,waterLog:[],photo:g.photo});state.cemetery.splice(i,1);save();closeModal();toast("Recuperada");show('plantas')}
function removeGrave(id){confirmModal("Eliminar recuerdo","¿Quitar este recuerdo del cementerio para siempre?",()=>{state.cemetery=state.cemetery.filter(x=>x.id!==id);save();closeModal();toast("Eliminado");show('cementerio')},true)}
function openGraveForm(){openModal(`<h3>Añadir recuerdo</h3><div class="field"><label>Nombre *</label><input id="g_name" class="inp" placeholder="Ej: Mi primer cactus"></div><div class="row"><div class="field"><label>Desde</label><input id="g_born" type="date" class="inp"></div><div class="field"><label>Hasta</label><input id="g_died" type="date" class="inp" value="${today()}"></div></div><div class="field"><label>Motivo</label><input id="g_reason" class="inp" placeholder="Opcional"></div><button class="btn btn-primary btn-block" onclick="J.saveGrave()">Guardar recuerdo</button>`)}
function saveGrave(){const n=$('#g_name').value.trim();if(!n){toast("Ponle nombre","bad");return}state.cemetery.unshift({id:uid(),name:n,reason:$('#g_reason').value,born:$('#g_born').value,died:$('#g_died').value,icon:{},stage:'adulta'});save();closeModal();show('cementerio')}

/* Perfil */
function scrPerfil(){const r=state.profile,li=r.levelIndex||0,rank=RANKS[li],next=RANKS[li+1],prog=next?Math.round((r.xp-rank.xp)/(next.xp-rank.xp)*100):100;
  $('#screen').innerHTML=`<div class="card" style="text-align:center;margin-bottom:13px">
    <div onclick="J.changeAvatar()" style="width:88px;height:88px;border-radius:50%;margin:0 auto 11px;cursor:pointer;background:${r.avatar?`url('${r.avatar}') center/cover`:'linear-gradient(135deg,var(--accent),var(--accent2))'};display:grid;place-items:center;color:#fff;border:3px solid #fff;box-shadow:0 8px 22px rgba(139,111,212,.35)">${r.avatar?'':ic(RANK_IC[li],34)}</div>

    <div class="progress" style="margin:15px 0 5px"><i style="width:${prog}%"></i></div><div class="mini">${next?`${r.xp} / ${next.xp} XP · faltan ${next.xp-r.xp} para ${next.n}`:'¡Nivel máximo!'}</div></div>
  <div class="grid3" style="margin-bottom:15px">${stat('leaf',r.points,'Puntos','')}${stat('star',r.xp,'XP total','')}${stat('flame',r.streak,'Racha','')}</div>
  <div class="grid3" style="margin-bottom:15px"><button class="btn btn-soft btn-sm" onclick="J.show('tareas')">${ic('checkc',16)} Tareas</button><button class="btn btn-soft btn-sm" onclick="J.show('tienda')">${ic('bag',16)} Tienda</button><button class="btn btn-soft btn-sm" onclick="J.show('cementerio')">${ic('grave',16)} Memoria</button></div>
  <div class="group-h line">Insignias · ${r.badges.length}/${BADGES.length}</div>
  <div class="badge-grid">${BADGES.map(b=>`<div class="badge ${r.badges.includes(b.id)?'':'lock'}"><div class="e">${ic(b.i,26)}</div><div class="n">${b.n}</div></div>`).join('')}</div>
  <div class="group-h line">Ubicaciones</div><div class="card">${r.locations.map((l,i)=>`<div class="list-row" style="padding:9px 0;margin:0;border-bottom:1px solid var(--line)"><div class="grow" style="display:flex;align-items:center;gap:7px">${ic('pin',15)} ${esc(l)}</div><span class="icon-btn" onclick="J.renameLoc(${i})">${ic('pencil',16)}</span><span class="icon-btn" onclick="J.delLoc(${i})">${ic('trash',16)}</span></div>`).join('')}<button class="btn btn-soft btn-block btn-sm" style="margin-top:11px" onclick="J.addLoc()">${ic('plus',15)} Añadir ubicación</button></div>
  <div class="group-h line">Actividad reciente</div><div class="card">${state.log.length?state.log.slice(0,8).map(l=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px"><span>${esc(l.t)}</span><b style="color:${l.n>=0?'var(--good)':'var(--bad)'};display:inline-flex;align-items:center;gap:3px">${l.n>=0?'+':''}${l.n} ${ic('leaf',12)}</b></div>`).join(''):'<div class="mini">Sin actividad todavía</div>'}</div>
  <div class="field" style="margin-top:16px"><label>Nombre del jardín</label><input class="inp" value="${esc(r.name)}" onchange="J.setName(this.value)"></div>
  <button class="btn btn-soft btn-block" style="margin-bottom:8px" onclick="J.installHelp()">${ic('plus',16)} Cómo instalar en el móvil</button>
  <button class="btn btn-ghost btn-block" onclick="J.resetAll()" style="color:var(--bad)">${ic('trash',16)} Reiniciar todos los datos</button>
  <div class="mini" style="text-align:center;margin-top:14px;opacity:.6">Josie · toca el logo 5 veces para ajustes</div>`}
function changeAvatar(){pickFile(d=>{state.profile.avatar=d;save();scrPerfil()})}
function setName(v){state.profile.name=v;save()}
function addLoc(){inputModal("Nueva ubicación",[{id:'loc',label:'Nombre',placeholder:'Ej: Estantería 2'}],v=>{if(v.loc){state.profile.locations.push(v.loc);save();scrPerfil()}})}
function renameLoc(i){inputModal("Renombrar ubicación",[{id:'loc',label:'Nombre',value:state.profile.locations[i]}],v=>{if(v.loc){const old=state.profile.locations[i];state.profile.locations[i]=v.loc;state.plants.forEach(p=>{if(p.location===old)p.location=v.loc});save();scrPerfil()}})}
function delLoc(i){if(state.profile.locations.length<=1){toast("Deja al menos una","bad");return}confirmModal("Eliminar ubicación","¿Eliminar «"+esc(state.profile.locations[i])+"»?",()=>{state.profile.locations.splice(i,1);save();closeModal2();scrPerfil()},true)}
function resetAll(){confirmModal("Reiniciar todo","¿Borrar TODO y empezar de cero? No se puede deshacer.",()=>{state=freshState();applyTheme();save();closeModal2();show('inicio')},true)}
function waterAll(){if(!state.plants.length){toast("No tienes plantas","bad");return}let c=0;state.plants.forEach(p=>{p.lastWater=today();logWater(p,today());state.counters.waterTotal++;c++});gain(c*PTS.regar,"Regar todo ("+c+")");recomputeBadges();save();show('inicio')}
