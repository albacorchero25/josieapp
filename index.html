/* modals */
function openModal(h){$('#modal').innerHTML='<div class="modal-grab"></div>'+h;$('#overlay').classList.add('on')}
function closeModal(){$('#overlay').classList.remove('on')}
function openModal2(h){$('#modal2').innerHTML=h;$('#overlay2').classList.add('on')}
function closeModal2(){$('#overlay2').classList.remove('on')}
function confirmModal(title,msg,onYes,danger){window._cy=onYes;openModal2(`<h3>${title}</h3><div class="mini" style="margin-bottom:18px;font-size:13.5px">${msg}</div><div class="row"><button class="btn btn-soft" onclick="J.closeModal2()">Cancelar</button><button class="btn ${danger?'btn-bad':'btn-primary'}" onclick="J._cyRun()">Sí, continuar</button></div>`)}
function _cyRun(){const f=window._cy;closeModal2();if(f)f()}
function inputModal(title,fields,onSubmit){window._isub=onSubmit;window._ifields=fields;const body=fields.map(f=>`<div class="field"><label>${f.label}</label><input id="im_${f.id}" class="inp" type="${f.type||'text'}" value="${esc(f.value||'')}" placeholder="${esc(f.placeholder||'')}"></div>`).join('');openModal2(`<h3>${title}</h3>${body}<div class="row"><button class="btn btn-soft" onclick="J.closeModal2()">Cancelar</button><button class="btn btn-primary" onclick="J._isubRun()">Guardar</button></div>`);setTimeout(()=>{const el=$('#im_'+fields[0].id);if(el)el.focus()},250)}
function _isubRun(){const v={};window._ifields.forEach(f=>v[f.id]=$('#im_'+f.id).value.trim());closeModal2();if(window._isub)window._isub(v)}
function pickFile(cb,accept="image/*"){const i=document.createElement('input');i.type='file';i.accept=accept;i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)};i.click()}

/* ADMIN */
let logoTaps=0,logoTimer;
function logoTapped(){logoTaps++;clearTimeout(logoTimer);logoTimer=setTimeout(()=>logoTaps=0,1400);if(logoTaps>=5){logoTaps=0;adminGate()}}
function adminGate(){if(window._adminOk){adminPanel();return}openModal(`<h3 style="display:flex;align-items:center;gap:8px">${ic('lock',20)} Panel de administración</h3><div class="mini" style="margin-bottom:14px">Zona privada. Introduce la contraseña.</div><input id="adm_pw" class="inp" type="password" placeholder="Contraseña" style="margin-bottom:14px"><button class="btn btn-primary btn-block" onclick="J.adminCheck()">Entrar</button>`);setTimeout(()=>$('#adm_pw')&&$('#adm_pw').focus(),300)}
function adminCheck(){if($('#adm_pw').value===ADMIN_PW){window._adminOk=true;adminPanel()}else toast("Contraseña incorrecta","bad")}
let admSec="tienda";
function adminPanel(){const secs=[['tienda','bag','Tienda'],['combos','puzzle','Combos'],['incubadora','flask','Incubadora'],['identidad','palette','Identidad']];
  openModal(`<h3 style="display:flex;align-items:center;gap:8px">${ic('gear',20)} Panel secreto</h3><div class="shop-cats">${secs.map(s=>`<div class="fil ${admSec===s[0]?'on':''}" onclick="J.admSecSet('${s[0]}')">${ic(s[1],14)} ${s[2]}</div>`).join('')}</div><div id="admBody"></div><button class="btn btn-ghost btn-block" style="margin-top:14px" onclick="J.closeModal()">Cerrar</button>`);renderAdmBody()}
function admSecSet(s){admSec=s;document.querySelectorAll('#modal .shop-cats .fil').forEach((el,i)=>el.classList.toggle('on',['tienda','combos','incubadora','identidad'][i]===s));renderAdmBody()}
function renderAdmBody(){const b=$('#admBody');if(!b)return;b.innerHTML=admSec==='tienda'?admTienda():admSec==='combos'?admCombos():admSec==='incubadora'?admIncubadora():admIdentidad()}
let admCat="macetas";
function admTienda(){const cats=[['macetas','Macetas'],['plantas','Plantas'],['fondos','Fondos'],['marcos','Marcos']],items=state.shop[admCat]||[];
  return `<div class="filters">${cats.map(c=>`<div class="fil ${admCat===c[0]?'on':''}" onclick="J.admCatSet('${c[0]}')">${c[1]}</div>`).join('')}</div><button class="btn btn-soft btn-block btn-sm" style="margin-bottom:10px" onclick="J.admAddItem()">${ic('plus',15)} Añadir artículo</button>
  ${items.map(it=>`<div class="adm-item"><div class="pic" onclick="J.admReplaceImg('${admCat}','${it.id}')">${miniImg(it.img)}</div><div style="flex:1;min-width:0"><input class="inp" style="padding:7px 9px;font-size:13px;margin-bottom:5px" value="${esc(it.name)}" onchange="J.admEditItem('${admCat}','${it.id}','name',this.value)"><div class="row" style="gap:6px"><input class="inp" style="padding:6px 9px;font-size:12px" type="number" value="${it.price}" onchange="J.admEditItem('${admCat}','${it.id}','price',+this.value)"><div style="display:flex;align-items:center;justify-content:center;gap:5px"><span class="mini">Visible</span><div class="toggle ${it.available?'on':''}" style="transform:scale(.8)" onclick="J.admToggle('${admCat}','${it.id}','available')"></div></div></div>${admCat==='marcos'?`<div style="display:flex;align-items:center;gap:6px;margin-top:5px"><span class="mini">Solo legendarias</span><div class="toggle ${it.legendaryOnly?'on':''}" style="transform:scale(.8)" onclick="J.admToggle('${admCat}','${it.id}','legendaryOnly')"></div></div>`:''}</div><span class="icon-btn" onclick="J.admDelItem('${admCat}','${it.id}')">${ic('trash',18)}</span></div>`).join('')||'<div class="mini" style="padding:14px 4px">Vacío. Añade artículos.</div>'}`}
function admCatSet(c){admCat=c;renderAdmBody()}
function admEditItem(cat,id,k,v){const it=state.shop[cat].find(x=>x.id===id);it[k]=v;save()}
function admToggle(cat,id,k){const it=state.shop[cat].find(x=>x.id===id);it[k]=!it[k];save();renderAdmBody()}
function admDelItem(cat,id){confirmModal("Eliminar artículo","¿Eliminar este artículo de la tienda?",()=>{state.shop[cat]=state.shop[cat].filter(x=>x.id!==id);state.inventory[cat]=state.inventory[cat].filter(x=>x!==id);save();closeModal2();renderAdmBody()},true)}
function admReplaceImg(cat,id){pickFile(d=>{const it=state.shop[cat].find(x=>x.id===id);it.img=d;save();renderAdmBody()})}
function admAddItem(){pickFile(d=>{inputModal("Nuevo artículo",[{id:'name',label:'Nombre',placeholder:'Ej: Maceta coral'},{id:'price',label:'Precio (puntos)',type:'number',value:'200'}],v=>{state.shop[admCat].push({id:admCat+'-'+uid(),name:v.name||'Nuevo',price:+v.price||200,img:d,available:true,legendaryOnly:admCat==='marcos'&&/dorad|gold/i.test(v.name||'')});save();renderAdmBody()})})}
function admCombos(){const pots=state.shop.macetas,plants=state.shop.plantas,existing=Object.keys(state.combos);
  return `<div class="mini" style="margin-bottom:10px">Vincula una maceta + una planta a tu imagen ya diseñada (el combo). Se mostrará cuando alguien combine ese par.</div>
  <div class="field"><label>Maceta</label><select id="cb_pot" class="inp">${pots.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div><div class="field"><label>Planta</label><select id="cb_plant" class="inp">${plants.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
  <button class="btn btn-primary btn-block" onclick="J.admAddCombo()">${ic('camera',16)} Subir imagen del combo</button><div class="group-h line">Combos guardados · ${existing.length}</div>
  ${existing.map(k=>{const[pt,pl]=k.split('|');const pn=(pots.find(x=>x.id===pt)||{}).name||pt,ln=(plants.find(x=>x.id===pl)||{}).name||pl;return `<div class="adm-item"><div class="pic">${miniImg(state.combos[k])}</div><div style="flex:1"><b style="font-size:13px">${esc(ln)} + ${esc(pn)}</b></div><span class="icon-btn" onclick="J.admDelCombo('${k}')">${ic('trash',18)}</span></div>`}).join('')||'<div class="mini">Sin combos aún.</div>'}`}
function admAddCombo(){const pot=$('#cb_pot').value,plant=$('#cb_plant').value;pickFile(d=>{state.combos[pot+'|'+plant]=d;save();renderAdmBody();toast("Combo guardado")})}
function admDelCombo(k){delete state.combos[k];save();renderAdmBody()}
function admIncubadora(){return `<div class="mini" style="margin-bottom:12px">Sube un icono propio para esquejes y para semillas (PNG con fondo transparente recomendado).</div>
  <div class="adm-item"><div class="inc-ic">${incIcon({type:'esqueje'})}</div><div style="flex:1"><b>Esquejes</b></div><button class="btn btn-soft btn-sm" onclick="J.admIncIcon('esqueje')">Subir</button></div>
  <div class="adm-item"><div class="inc-ic">${incIcon({type:'semilla'})}</div><div style="flex:1"><b>Semillas</b></div><button class="btn btn-soft btn-sm" onclick="J.admIncIcon('semilla')">Subir</button></div>
  <button class="btn btn-ghost btn-block btn-sm" style="margin-top:6px" onclick="J.admResetInc()">Restaurar iconos por defecto</button>`}
function admIncIcon(t){pickFile(d=>{if(t==='esqueje')state.theme.incEsqueje=d;else state.theme.incSemilla=d;save();renderAdmBody()})}
function admResetInc(){state.theme.incEsqueje=null;state.theme.incSemilla=null;save();renderAdmBody()}
function admIdentidad(){const th=state.theme;const cvar=(label,key,def)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0"><span class="mini">${label}</span><input type="color" class="swatch" value="${th.colors[key]||def}" onchange="J.admColor('${key}',this.value)"></div>`;
  return `<div class="adm-item"><div class="logo-img" style="width:48px;height:48px;display:grid;place-items:center;color:var(--accent3)">${th.logo?`<img src="${th.logo}" style="width:100%;height:100%;border-radius:10px;object-fit:cover">`:ic('leaf',22)}</div><div style="flex:1"><b>Logo</b></div><button class="btn btn-soft btn-sm" onclick="J.admLogo()">Subir</button><button class="btn btn-ghost btn-sm" onclick="J.admLogoReset()">Quitar</button></div>
  <div class="field" style="margin-top:10px"><label>Nombre de la app</label><input class="inp" value="${esc(th.appName)}" onchange="J.admAppName(this.value)"></div>
  <div class="adm-item"><div class="pic">${miniImg(baseIcon())}</div><div style="flex:1"><b>Icono base</b><div class="mini">por defecto en toda planta</div></div><button class="btn btn-soft btn-sm" onclick="J.admBase()">Subir</button></div>
  <div class="group-h line">Colores</div><div class="card">${cvar('Acento principal','accent','#9277D6')}${cvar('Acento claro','accent2','#B7A4EC')}${cvar('Acento profundo','accent3','#6A4FBE')}${cvar('Color de texto base','ink','#2E2747')}${cvar('Fondo','bg','#FAF8FE')}${cvar('Dorado','gold','#C2A24A')}<button class="btn btn-ghost btn-sm btn-block" style="margin-top:8px" onclick="J.admColorReset()">Restaurar colores</button></div>
  <div class="group-h line">Texto y tipografías</div><div class="card">${textRole('Logotipo','logo')}${textRole('Títulos','head')}${textRole('Texto general','body')}
    <button class="btn btn-soft btn-sm btn-block" style="margin-top:6px" onclick="J.admUploadFont()">${ic('plus',15)} Subir tipografía propia</button>
    <div class="mini" style="margin-top:6px">Para cada apartado puedes elegir tipografía, color, negrita y cursiva.</div></div>`}
function textRole(label,key){const th=state.theme,fonts=['','-apple-system,sans-serif','Georgia,serif','Times New Roman,serif','Courier New,monospace',...Object.keys(th.customFonts||{})];
  const nm=f=>f===''?(key==='logo'?'Serif elegante':'Sistema (por defecto)'):f.split(',')[0];const t=(th.text&&th.text[key])||{color:'',bold:false,italic:false};
  return `<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div class="mini" style="font-weight:800;color:var(--ink);margin-bottom:7px">${label}</div>
    <select class="inp" style="margin-bottom:8px;padding:9px 11px" onchange="J.admFont('${key}',this.value)">${fonts.map(f=>`<option value="${esc(f)}" ${(th.fonts[key]||'')===f?'selected':''}>${nm(f)}</option>`).join('')}</select>
    <div style="display:flex;align-items:center;gap:10px"><span class="mini">Color</span><input type="color" class="swatch" value="${t.color||(key==='logo'?'#7857C4':'#3B315C')}" onchange="J.admText('${key}','color',this.value)">
      <div class="style-btns" style="margin-left:auto"><div class="sbtn ${t.bold?'on':''}" style="font-weight:900" onclick="J.admText('${key}','bold',!${!!t.bold})">B</div><div class="sbtn ${t.italic?'on':''}" style="font-style:italic;font-family:Georgia,serif" onclick="J.admText('${key}','italic',!${!!t.italic})">i</div></div></div></div>`}
function admColor(k,v){state.theme.colors[k]=v;applyTheme();save()}
function admColorReset(){state.theme.colors={};applyTheme();save();renderAdmBody()}
function admFont(k,v){state.theme.fonts[k]=v;applyTheme();save()}
function admText(role,prop,val){state.theme.text[role]=state.theme.text[role]||{};state.theme.text[role][prop]=val;applyTheme();save();renderAdmBody()}
function admUploadFont(){pickFile(d=>{inputModal("Tipografía",[{id:'name',label:'Nombre',placeholder:'Mi fuente'}],v=>{const fam="cf-"+uid();state.theme.customFonts[(v.name||'Fuente')+","+fam]=d;const s=document.createElement('style');s.id='ff-'+fam;s.textContent=`@font-face{font-family:'${fam}';src:url('${d}')}`;document.head.appendChild(s);save();renderAdmBody();toast("Tipografía añadida")})},".ttf,.otf,.woff,.woff2,font/*")}
function admLogo(){pickFile(d=>{state.theme.logo=d;applyTheme();save();renderAdmBody()})}
function admLogoReset(){state.theme.logo=null;applyTheme();save();renderAdmBody()}
function admAppName(v){state.theme.appName=v;applyTheme();save();setupInstall()}
function admBase(){pickFile(d=>{state.theme.baseIcon=d;save();renderAdmBody()})}

function fontVal(f,fallback){return(f&&f!=='')?f:fallback}
function applyTheme(){const th=state.theme,r=document.documentElement.style,c=th.colors||{},tx=th.text||{};
  ['accent','accent2','accent3','ink','bg','gold'].forEach(k=>{if(c[k])r.setProperty('--'+k,c[k]);else r.removeProperty('--'+k)});
  r.setProperty('--font-logo',fontVal(th.fonts.logo,"'Hoefler Text','Didot','Bodoni MT',Georgia,serif"));
  r.setProperty('--font-head',fontVal(th.fonts.head,'-apple-system,sans-serif'));
  r.setProperty('--font-body',fontVal(th.fonts.body,'-apple-system,sans-serif'));
  const L=tx.logo||{},Hh=tx.head||{},B=tx.body||{};
  r.setProperty('--c-logo',L.color||'var(--accent3)');r.setProperty('--w-logo',L.bold?'700':'500');r.setProperty('--st-logo',L.italic?'italic':'normal');
  r.setProperty('--c-head',Hh.color||'var(--ink)');r.setProperty('--w-head',Hh.bold?'800':'600');r.setProperty('--st-head',Hh.italic?'italic':'normal');
  r.setProperty('--c-body',B.color||'var(--ink)');r.setProperty('--w-body',B.bold?'600':'400');r.setProperty('--st-body',B.italic?'italic':'normal');
  Object.entries(th.customFonts||{}).forEach(([k,d])=>{const fam=k.split(',')[1];if(fam&&!document.getElementById('ff-'+fam)){const s=document.createElement('style');s.id='ff-'+fam;s.textContent=`@font-face{font-family:'${fam}';src:url('${d}')}`;document.head.appendChild(s)}});
  $('#logoTxt').textContent=th.appName||'Josie';const li=$('#logoImg');if(th.logo){li.src=th.logo;li.classList.remove('hidden')}else li.classList.add('hidden')}

function setupInstall(){try{const ti=TOUCH_ICON||baseIcon();document.getElementById('touchIcon').href=ti;
  const m={name:state.theme.appName||'Josie',short_name:state.theme.appName||'Josie',start_url:'.',scope:'.',display:'standalone',background_color:'#F4F1FB',theme_color:'#F4F1FB',icons:[{src:ti,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});document.getElementById('maniLink').href=URL.createObjectURL(blob)}catch(e){}}

const J={show,quickAdd,waterAll,openPlant,toggleFav,plantMenu,setFilter,setSearch,fichaTabSet,openPlantForm,savePlant,water,setWater,fert,setFert,transplant,cleanPlant,review,toggleFlower,toggleTag,toggleSympt,setNotes,setPhase,killPlant,confirmKill,deletePlant,addPhoto,removePhoto,openIconPicker,setIconPart,renderFicha,toggleTask,deleteTask,openTaskForm,saveTask,openInc,setIncStage,setIncRoot,promote,incDie,incDelete,openIncForm,pickIncType,saveInc,setShopCat,buy,openGrave,restoreGrave,removeGrave,openGraveForm,saveGrave,changeAvatar,setName,addLoc,renameLoc,delLoc,resetAll,installHelp,closeModal,closeModal2,_cyRun,_isubRun,adminCheck,admSecSet,admCatSet,admEditItem,admToggle,admDelItem,admReplaceImg,admAddItem,admAddCombo,admDelCombo,admIncIcon,admResetInc,admColor,admColorReset,admFont,admText,admUploadFont,admLogo,admLogoReset,admAppName,admBase};
window.J=J;
$('#logoTap').addEventListener('click',logoTapped);
load();applyTheme();setupInstall();dailyLogin();syncHeader();show('inicio');
</script>
